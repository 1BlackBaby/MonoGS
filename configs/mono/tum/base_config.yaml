Results:
  save_results: True
  save_dir: "results"
  save_trj: True
  save_trj_kf_intv: 10
  use_gui: False
  eval_rendering: True
  use_wandb: False

Dataset:
  type: 'tum'
  sensor_type: 'monocular'
  feature_path: ""
  feature_format: "npy"
  mono_prior_path: ""
  metric3d_depth_path: ""
  flow_path: ""
  prior_mask_path: ""
  prior_format: "npy"
  pcd_downsample: 64
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01
  single_thread: True

Training:
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  tracking_itr_num: 100
  mapping_itr_num: 150
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20
  kf_interval: 5
  window_size: 8
  pose_window: 3
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01

  kf_translation: 0.08
  kf_min_translation: 0.05
  kf_overlap: 0.9
  kf_cutoff: 0.3
  prune_mode: 'slam'
  single_thread: True
  spherical_harmonics: False
  blur_aware_tracking:
    enabled: False
    num_virtual_views: 3
    shutter_ratio: 1.0
    motion_l2: 0.001
    start_after_keyframes: 2

  lsg_slam:
    enabled: False
  lsg_pose_init:
    enabled: False
    pose_after_init: True
    max_keypoints: 1024
    match_topk: 512
    min_matches: 20
    min_pnp_inliers: 20
    min_inlier_ratio: 0.25

  gaustar_stage1:
    enabled: True
    use_metric3d_depth: True
    use_flow_pose_init: True
    use_rendered_depth_filter: True
    depth_scale_align: "median"
    depth_consistency_threshold: 0.12
    flow_fb_pixel_threshold: 3.0
    flow_depth_fb_threshold: 0.05
    depth_edge_kernel: 7
    depth_edge_threshold: 0.1
    min_pose_correspondences: 200
    min_pose_inliers: 80
    max_pose_reproj_error: 4.0
    max_pose_correspondences: 5000
    tracking_filter_min_ratio: 0.05
    apply_filter_to_tracking: False
    apply_filter_to_keyframe_depth: False
    apply_filter_to_render_guided_densification: True
    require_rendered_depth_for_keyframe_depth: True
    flow_pose_after_init: True
    flow_pose_compare_init_loss: True
    flow_pose_loss_improvement: 0.0
    max_flow_pose_translation_ratio: 0.5
    max_flow_pose_rotation_deg: 20.0
    use_depth_scale_for_flow_pose: True
    apply_filter_after_init: True
    tracking_filter_soft_weight: 0.3
    precompute_flow: True
    raft_root: "/home/xushengchao/MonoGS/RAFT"
    raft_checkpoint: "/home/xushengchao/MonoGS/RAFT/models/raft-things.pth"
    flow_iters: 20
    flow_skip_existing: True

  uncertainty:
    enabled: False
    feature_dim: 384
    feature_type: "dino"
    extract_features_online: True
    feature_extractor: "dinov2_reg_small_fine"
    feature_output_root: "output"
    feature_suffix: ""
    min_uncertainty: 0.1
    eps: 0.001
    min_weight_threshold: 0.1
    train_frac_fix: 0.3
    ssim_window_size: 7
    ssim_median_filter_size: 5
    opacity_th_for_uncer_loss: 0.9
    reg_stride: 2
    reg_max_samples: 4096
    reg_mult: 0.5
    ssim_mult: 0.5
    uncer_depth_mult: 0.2
    lr: 0.0004
    weight_decay: 0.00001
    apply_to_tracking_rgb: True
    apply_to_tracking_depth: False
    tracking_warmup_keyframes: 25
    tracking_warmup_backend_syncs: 1
    apply_to_mapping_rgb: True
    apply_to_mapping_depth: True
    apply_during_init: False

  render_guided_densification:
    enabled: False
    use_opacity_hole: True
    use_rgb_error: True
    use_depth_error: False
    opacity_threshold: 0.5
    rgb_error_threshold: 0.25
    depth_error_ratio_threshold: 0.1
    max_new_points_per_kf: 3000
    max_new_points_per_update: 3000
    min_depth: 0.01
    trigger_every: 150
    trigger_offset: 50
    downsample: 1
    pcd_downsample: 4
    initial_opacity: 0.8

  forgetting_regularization:
    enabled: False
    update_every_kf: 1
    lambda_color: 0.01
    lambda_scaling: 0.01
    lambda_xyz: 0.0
    lambda_opacity: 0.0
    max_history_views: 3
    normalize_importance: True
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

opt_params:
  iterations: 30000
  position_lr_init: 0.0016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False

mono_prior:
  depth: "metric3d_vit_large"
  feature_extractor: "dinov2_reg_small_fine"
