Results:
  save_results: False
  save_dir: "results"
  save_trj: False
  save_trj_kf_intv: 0
  use_gui: True
  eval_rendering: False
  use_wandb: False

Dataset:
  sensor_type: 'monocular'
  feature_path: ""
  feature_format: "npy"
  pcd_downsample: 32
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01
  type: 'realsense'

Training:
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  tracking_itr_num: 50
  mapping_itr_num: 50
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20
  kf_interval: 5
  window_size: 8
  pose_window: 3
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01
  single_thread: False
  spherical_harmonics: True

  kf_translation: 0.05
  kf_min_translation: 0.02
  kf_overlap: 0.9
  kf_cutoff: 0.3
  prune_mode: 'slam'
  uncertainty:
    enabled: False
    feature_dim: 384
    feature_type: "dino"
    min_uncertainty: 0.1
    eps: 0.001
    min_weight_threshold: 0.1
    train_frac_fix: 0.3
    ssim_window_size: 7
    ssim_median_filter_size: 5
    opacity_th_for_uncer_loss: 0.9
    reg_stride: 2
    reg_max_samples: 4096
    reg_mult: 0.5
    ssim_mult: 0.5
    uncer_depth_mult: 0.2
    lr: 0.0004
    weight_decay: 0.00001
    apply_to_tracking_rgb: True
    apply_to_tracking_depth: False
    apply_to_mapping_rgb: True
    apply_to_mapping_depth: True
    apply_during_init: True
  render_guided_densification:
    enabled: False
    use_opacity_hole: True
    use_rgb_error: True
    use_depth_error: False
    opacity_threshold: 0.5
    rgb_error_threshold: 0.25
    depth_error_ratio_threshold: 0.1
    max_new_points_per_kf: 3000
    max_new_points_per_update: 3000
    min_depth: 0.01
    trigger_every: 150
    trigger_offset: 50
    downsample: 1
    initial_opacity: 0.8
  forgetting_regularization:
    enabled: False
    update_every_kf: 1
    lambda_color: 0.01
    lambda_scaling: 0.01
    lambda_xyz: 0.0
    lambda_opacity: 0.0
    max_history_views: 3
    normalize_importance: True

  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001


opt_params:
  iterations: 30000
  position_lr_init: 0.0016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
